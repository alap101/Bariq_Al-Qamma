<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcade Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0c0d14; }
        /* أنميشن تكبير مرن يعطي إحساس بالاختيار */
        .game-card {
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), border-color 0.3s;
        }
        .game-card:hover {
            transform: scale(1.08); /* تكبير بنسبة 8% عند التمرير */
        }
    </style>
</head>
<body class="text-white min-h-screen font-sans">

    <header class="bg-[#181a26] border-b border-purple-500/10 py-4 px-6 flex justify-between items-center shadow-lg">
        <h1 class="text-xl font-black bg-gradient-to-r from-purple-400 to-pink-500 bg-clip-text text-transparent">ARCADE_HUB</h1>
    </header>

    <main class="max-w-7xl mx-auto p-6">
        <h2 class="text-lg font-bold mb-6 text-gray-300">All Games</h2>
        
        <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-4">
            
            <a href="8ball.html" class="game-card group block relative aspect-square rounded-xl overflow-hidden bg-[#181a26] border border-gray-800 p-2 shadow-md hover:border-purple-500/60 hover:shadow-purple-500/10">
                <div class="w-full h-[80%] rounded-lg bg-purple-900/20 flex items-center justify-center text-4xl">
                    🎱 </div>
                <div class="h-[20%] flex items-center justify-center mt-1">
                    <span class="text-xs font-bold text-gray-300 group-hover:text-white truncate block w-full text-center">8 Ball Pool</span>
                </div>
            </a>

            <div class="opacity-30 aspect-square rounded-xl bg-[#181a26] border border-gray-800 p-2 flex flex-col justify-between items-center">
                <div class="w-full h-[80%] bg-gray-800 rounded-lg flex items-center justify-center text-xs text-gray-500">Coming Soon</div>
                <span class="text-xs text-gray-500 mb-1">Next Game</span>
            </div>

        </div>
    </main>
</body>
</html>
