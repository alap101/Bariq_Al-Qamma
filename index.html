<!DOCTYPE html>
<html lang="ar" dir="rtl" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بريق القمة المميزة | أنظمة وحلول الحماية الذكية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap');
        body { font-family: 'Tajawal', sans-serif; }
        .slide { display: none; }
        .slide.active { display: block; animation: fadeIn 0.8s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">

    <header class="bg-white shadow-sm sticky top-0 z-50 border-b border-gray-100">
        <div class="max-w-6xl mx-auto px-4 py-3 flex justify-between items-center">
            
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 bg-slate-900 rounded-xl flex items-center justify-center transform rotate-3 shadow-lg">
                    <svg class="w-8 h-8 text-white" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M21 6.5l-4 4V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4c.28.28.67.45 1.08.45.83 0 1.5-.67 1.5-1.5v-10c0-.83-.67-1.5-1.5-1.5-.41 0-.8.17-1.08.45z"/>
                    </svg>
                </div>
                <div class="flex flex-col">
                    <h1 class="font-black text-xl md:text-2xl text-slate-950 leading-tight">بريق القمة المميزة</h1>
                    <span class="text-[10px] text-slate-500 font-bold tracking-widest uppercase">B.A.A.M SOLUTIONS</span>
                </div>
            </div>

            <div class="hidden sm:block">
                <span class="text-xs bg-blue-50 text-blue-700 font-bold px-4 py-2 rounded-full border border-blue-100">
                    <i class="fa-solid fa-shield-halved ml-1"></i> أنظمة أمنية ذكية
                </span>
            </div>
        </div>
    </header>

    <section class="bg-slate-900 text-white py-16 px-4 text-center">
        <h1 class="text-3xl md:text-5xl font-black mb-6">نؤمّن ممتلكاتك بأحدث التقنيات</h1>
        <p class="text-gray-400 max-w-lg mx-auto">حلول حماية ذكية، دقة عالية، وتركيب احترافي يناسب احتياجاتك.</p>
    </section>

    <section class="max-w-6xl mx-auto px-4 -mt-10">
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <a href="#home-security" class="bg-white p-6 rounded-2xl shadow-lg border border-gray-100 text-center hover:shadow-xl transition hover:-translate-y-1">
                <i class="fa-solid fa-house-shield text-3xl text-blue-600 mb-3"></i>
                <p class="font-bold">حماية المنازل</p>
            </a>
            <a href="#shop-security" class="bg-white p-6 rounded-2xl shadow-lg border border-gray-100 text-center hover:shadow-xl transition hover:-translate-y-1">
                <i class="fa-solid fa-shop text-3xl text-indigo-600 mb-3"></i>
                <p class="font-bold">حماية المحلات</p>
            </a>
            <a href="#camera-install" class="bg-white p-6 rounded-2xl shadow-lg border border-gray-100 text-center hover:shadow-xl transition hover:-translate-y-1">
                <i class="fa-solid fa-video text-3xl text-emerald-600 mb-3"></i>
                <p class="font-bold">تركيب كاميرات</p>
            </a>
            <a href="#gate-systems" class="bg-white p-6 rounded-2xl shadow-lg border border-gray-100 text-center hover:shadow-xl transition hover:-translate-y-1">
                <i class="fa-solid fa-door-open text-3xl text-amber-600 mb-3"></i>
                <p class="font-bold">مكائن الأبواب</p>
            </a>
        </div>
    </section>

    <main class="max-w-5xl mx-auto px-4 py-16 space-y-16">
        </main>

    <footer class="bg-slate-950 text-white py-12 text-center">
        <p class="font-bold text-lg mb-2">بريق القمة المميزة</p>
        <p class="text-xs text-gray-500">جميع الحقوق محفوظة © 2026</p>
    </footer>

    <script>
        // سكربت السلايدر الخاص بك كما هو
        let currentSlide = 0;
        const slides = document.querySelectorAll('.slide');
        setInterval(() => {
            if(slides.length > 0) {
                slides[currentSlide].classList.remove('active');
                currentSlide = (currentSlide + 1) % slides.length;
                slides[currentSlide].classList.add('active');
            }
        }, 4000);
    </script>
</body>
</html>
